<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Monisha</title>

<style>

body{
margin:0;
font-family:Segoe UI;
text-align:center;
color:white;
background:black;
overflow:hidden;
}

/* loading screen */

#loader{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
z-index:999;
animation:hide 3s forwards;
}

@keyframes hide{
0%{opacity:1}
90%{opacity:1}
100%{opacity:0;visibility:hidden}
}

/* background */

.bg{
position:fixed;
width:100%;
height:100%;
background:linear-gradient(270deg,#ff416c,#ff4b2b,#ff6a88,#ff99ac);
background-size:600% 600%;
animation:bg 8s infinite;
z-index:-1;
}

@keyframes bg{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

/* text */

h1{
font-size:45px;
text-shadow:0 0 20px black;
margin-top:40px;
}

h2{
font-size:30px;
}

/* image */

img{
width:260px;
border-radius:20px;
border:5px solid white;
box-shadow:0 0 20px white;
margin-top:20px;
}

/* button */

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:10px;
background:white;
color:red;
margin-top:20px;
}

button:hover{
background:pink;
}

/* message */

#msg{
font-size:25px;
color:yellow;
margin-top:20px;
}

/* hearts */

.heart{
position:fixed;
color:red;
font-size:20px;
animation:fall linear infinite;
}

@keyframes fall{
0%{top:-10%}
100%{top:110%}
}

</style>

</head>

<body>

<div id="loader">
Loading surprise ❤️
</div>

<div class="bg"></div>

<h1>Happy 21st Birthday ❤️</h1>

<h2>Monisha H 👑</h2>

<img src="R6M20616.JPG">

<p>
Happy 21st Birthday my love ❤️  
You are my happiness, my heart, my life.  
I promise to love you forever.
</p>

<button onclick="show()">Click for Surprise 🎁</button>

<div id="msg"></div>

<script>

function show(){
document.getElementById("msg").innerHTML =
"I LOVE YOU FOREVER MONISHA ❤️";
}

/* hearts */

for(let i=0;i<30;i++){
let h=document.createElement("div");
h.innerHTML="❤️";
h.className="heart";
h.style.left=Math.random()*100+"%";
h.style.animationDuration=3+Math.random()*5+"s";
document.body.appendChild(h);
}

</script>

</body>
</html>
